name: docs-check

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  markdown-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure key docs exist
        run: |
          test -f README.md
          test -f architecture/JPIS_PROJECT_BLUEPRINT.md
          test -f architecture/INFRASTRUCTURE.md
